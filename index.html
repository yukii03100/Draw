<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>主題抽選</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Courier New", monospace;
    background: #111;
    color: white;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100vh;
    background:
      linear-gradient(rgba(0,0,0,0.08), rgba(0,0,0,0.42)),
      url("image.png") center / cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 天花板 */
  /* 霧氣 */
  .mist {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }

  .top-text {
    position: absolute;
    top: 18px;
    left: 18px;
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.8;
    text-shadow: 2px 2px 0 #000;
  }

  .portal {
    position: relative;
    width: 260px;
    height: 380px;
    border-radius: 50%;
    background: white;
    box-shadow:
      0 0 35px white,
      0 0 80px rgba(255,255,255,0.9),
      0 0 130px rgba(255,255,255,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    animation: float 2.8s ease-in-out infinite, glow 1.8s infinite alternate;
    z-index: 5;
  }

  .portal.is-showing-topic {
    cursor: default;
    background: transparent;
    box-shadow: none;
  }

  .portal:hover {
    transform: scale(1.04);
  }

  .portal span {
    width: 82%;
    padding: 0 16px;
    font-size: 86px;
    color: red;
    text-shadow: 3px 3px 0 #fff, 5px 5px 0 #999;
    font-weight: bold;
    line-height: 1.08;
    text-align: center;
    white-space: nowrap;
  }

  .portal.is-showing-topic span {
    font-size: clamp(32px, 5vw, 58px);
    color: black;
    text-shadow: 3px 3px 0 rgba(255,255,255,0.45);
  }

  @keyframes float {
    0%, 100% { translate: 0 0; }
    50% { translate: 0 -10px; }
  }

  @keyframes glow {
    from {
      filter: blur(0px);
    }
    to {
      filter: blur(1.5px);
    }
  }

  .noise {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 1px,
        transparent 3px
      );
    pointer-events: none;
    mix-blend-mode: screen;
    z-index: 20;
  }
</style>
</head>

<body>
  <div class="scene">
    <div class="mist"></div>

    <div class="top-text">點擊抽選主題</div>
    <div class="portal" id="portal" onclick="drawTopic()">
      <span id="portalText">?</span>
    </div>

    <div class="noise"></div>
  </div>

<script>
  const topics = [
    "人際關係",
    "壓力",
    "AI",
    "遊戲",
    "畢業後",
    "音樂"
  ];

  const portal = document.getElementById("portal");
  const portalText = document.getElementById("portalText");
  let resetTimer = null;

  function drawTopic() {
    if (resetTimer) return;

    const randomTopic = topics[Math.floor(Math.random() * topics.length)];
    portalText.textContent = randomTopic;
    portal.classList.add("is-showing-topic");

    resetTimer = setTimeout(() => {
      portalText.textContent = "?";
      portal.classList.remove("is-showing-topic");
      resetTimer = null;
    }, 10000);
  }
</script>
</body>
</html>
